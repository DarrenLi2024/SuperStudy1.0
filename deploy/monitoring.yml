# =============================================
# SuperStudy 监控栈 (Prometheus + Grafana)
# =============================================
# 使用方式：
#   docker compose -f docker-compose.yml -f deploy/monitoring.yml up -d
# =============================================

services:
  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: superstudy-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:10.1.0
    container_name: superstudy-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-superstudy123}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- Redis Exporter ----
  redis-exporter:
    image: oliver006/redis_exporter:v1.53.0
    container_name: superstudy-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    restart: unless-stopped

  # ---- MySQL Exporter ----
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: superstudy-mysql-exporter
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: "root:${SPRING_DATASOURCE_PASSWORD:-root123}@(db:3306)/"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
