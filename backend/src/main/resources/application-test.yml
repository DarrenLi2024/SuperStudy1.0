# 测试环境配置 - 使用H2内存数据库替代MySQL，简化本地测试运行
spring:
  datasource:
    url: jdbc:h2:mem:superstudy;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 1000ms
    lettuce:
      pool:
        max-active: 2
        max-idle: 1
        min-idle: 0

jwt:
  secret: test-secret-key-for-unit-tests-only-abcdefghijklmnopqrstuvwxyz
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.example: debug
