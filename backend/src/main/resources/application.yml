server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: superstudy-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/superstudy?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.sys.entity,com.example.student.entity
  configuration:
    map-underscore-to-camel-case: true
    # 开发环境打印 SQL；生产环境通过 spring.profiles.active=prod 自动禁用（见 application-prod.yml）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # 生产环境必须通过 JWT_SECRET 环境变量覆盖！至少 64 字符（HS512 要求）
  secret: ${JWT_SECRET:superstudy-secret-key-2024-abcdefghijklmnopqrstuvwxyz}
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

# ========================
# AI 大模型配置
# ========================
# 默认使用 local 模式（确定性降级，不调用远程API）。
# 生产环境需配置为真实 LLM Provider，支持 OpenAI 协议兼容的所有服务。
#
# 配置示例：
#   DeepSeek:
#     provider: deepseek
#     base-url: https://api.deepseek.com/v1/chat/completions
#     api-key: sk-your-deepseek-api-key
#     model: deepseek-chat
#
#   OpenAI:
#     provider: openai
#     base-url: https://api.openai.com/v1/chat/completions
#     api-key: sk-your-openai-api-key
#     model: gpt-4o-mini
#
#   Ollama (本地):
#     provider: ollama
#     base-url: http://localhost:11434/v1/chat/completions
#     api-key: ollama
#     model: qwen2.5:7b
#
# ========================
# AI 大模型配置 — 多层覆盖
# ========================
# 优先级（高→低）：环境变量 > application-dev.yml > application.yml 默认值
#
# 快速启用真实 AI（二选一）：
#   方式 A — 设环境变量（推荐）：
#     export AI_LLM_PROVIDER=deepseek
#     export AI_LLM_BASE_URL=https://api.deepseek.com/v1/chat/completions
#     export AI_LLM_API_KEY=sk-你的密钥
#     export AI_LLM_MODEL=deepseek-chat
#     mvn spring-boot:run
#
#   方式 B — 使用 dev profile：
#     cp docs/application-dev.example.yml src/main/resources/application-dev.yml
#     编辑 application-dev.yml 填入密钥
#     SPRING_PROFILES_ACTIVE=dev mvn spring-boot:run
#
ai:
  llm:
    provider: ${AI_LLM_PROVIDER:local}
    base-url: ${AI_LLM_BASE_URL:}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:local-deterministic}
    timeout-ms: ${AI_LLM_TIMEOUT_MS:5000}
    max-retries: ${AI_LLM_MAX_RETRIES:1}
    cache-enabled: true
    cache-ttl-seconds: 1800
    stream-enabled: ${AI_LLM_STREAM_ENABLED:true}

# ========================
# Actuator 监控端点
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.example: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}
