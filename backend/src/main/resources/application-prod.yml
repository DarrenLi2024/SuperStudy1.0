server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: 3000ms

jwt:
  # 生产环境 JWT_SECRET 必须通过环境变量注入，至少 64 字符（HS512 要求）
  # 未设置会导致启动失败 — 这是预期的安全行为
  secret: ${JWT_SECRET}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# ========================
# AI 大模型配置 — 生产环境
# ========================
# 生产环境务必设置以下环境变量以启用真实 AI：
#   AI_LLM_PROVIDER=deepseek
#   AI_LLM_BASE_URL=https://api.deepseek.com/v1/chat/completions
#   AI_LLM_API_KEY=sk-你的密钥
#   AI_LLM_MODEL=deepseek-chat
#
# 未设置时自动降级为确定性规则模式（功能正常但输出质量受限）。
ai:
  llm:
    provider: ${AI_LLM_PROVIDER:}
    base-url: ${AI_LLM_BASE_URL:}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:}
    timeout-ms: ${AI_LLM_TIMEOUT_MS:8000}
    max-retries: ${AI_LLM_MAX_RETRIES:2}
    cache-enabled: true
    cache-ttl-seconds: 1800

logging:
  level:
    com.example: info
    org.springframework.security: warn
  file:
    path: /app/logs
    name: /app/logs/superstudy.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

# 生产环境关闭 MyBatis-Plus SQL 日志输出
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
