server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/superstudy?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    timeout: 3000ms

jwt:
  secret: ${JWT_SECRET:superstudy-secret-key-2024-abcdefghijklmnopqrstuvwxyz}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.example: info
    org.springframework.security: warn
  file:
    path: /app/logs
    name: /app/logs/superstudy.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
