worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 后端 API 地址（通过环境变量注入，Railway 上可通过变量配置）
    # 格式: backend-production-a907.up.railway.app
    resolver 1.1.1.1 valid=30s ipv6=off;

    server {
        listen 80;
        listen [::]:80;
        # Railway 健康检查默认检查 PORT 环境变量（通常 8080），同时监听两个端口
        listen 8080;
        listen [::]:8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1024;

        # API 反向代理 — 避免跨域问题，通过同源 /api/ 转发到后端
        location /api/ {
            set $backend_url "backend-production-a907.up.railway.app";
            proxy_pass https://$backend_url;
            proxy_set_header Host $backend_url;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Static assets with long cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — all non-file routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }
}
