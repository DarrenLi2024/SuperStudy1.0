# =============================================
# SuperStudy 本地生产环境模拟
# =============================================
# 使用方式：
#   1. 构建：  docker compose build
#   2. 启动：  docker compose up -d
#   3. 停止：  docker compose down
#
# 环境变量文件 .env 需包含：
#   JWT_SECRET=<随机密钥>
#   SPRING_DATASOURCE_PASSWORD=<数据库密码>
#   AI_LLM_API_KEY=<你的DeepSeek密钥>
# =============================================

services:
  # ---- MySQL 数据库 ----
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?err}
      MYSQL_DATABASE: superstudy
    # 生产环境不要暴露数据库端口到宿主机，仅内部网络通信
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/zeabur-schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${SPRING_DATASOURCE_PASSWORD:?err}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${SPRING_REDIS_PASSWORD:?err}
    # 生产环境不要暴露 Redis 端口到宿主机
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_REDIS_PASSWORD:?err}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/superstudy?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?err}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:?err}
      JWT_SECRET: ${JWT_SECRET}
      AI_LLM_PROVIDER: ${AI_LLM_PROVIDER:-deepseek}
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-https://api.deepseek.com/v1/chat/completions}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-deepseek-chat}
      AI_LLM_TIMEOUT_MS: "8000"
      AI_LLM_MAX_RETRIES: "2"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Nginx 前端 ----
  frontend:
    build:
      # 从项目根目录构建，以便能 COPY nginx.conf（位于根目录）
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
